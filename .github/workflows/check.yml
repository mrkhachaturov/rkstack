name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Check generated files are fresh
        run: bun scripts/gen-skill-docs.ts --dry-run

      - name: Skill health check
        run: bun scripts/skill-check.ts

      - name: Run tests
        run: bun test
