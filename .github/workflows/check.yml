name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Check version sync
        run: |
          VERSION_FILE=$(cat VERSION)
          PLUGIN_VERSION=$(jq -r .version .claude-plugin/plugin.json)
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$VERSION_FILE" != "$PLUGIN_VERSION" ] || [ "$VERSION_FILE" != "$PKG_VERSION" ]; then
            echo "ERROR: Version mismatch detected:"
            echo "  VERSION file:   $VERSION_FILE"
            echo "  plugin.json:    $PLUGIN_VERSION"
            echo "  package.json:   $PKG_VERSION"
            echo ""
            echo "All three must match. Update the out-of-sync file(s)."
            exit 1
          fi
          echo "Version sync OK: $VERSION_FILE"

      - name: Check generated files are fresh
        run: bun scripts/gen-skill-docs.ts --dry-run

      - name: Skill health check
        run: bun scripts/skill-check.ts

      - name: Install Playwright Chromium
        run: bunx playwright install chromium

      - name: Run tests
        run: bun test
