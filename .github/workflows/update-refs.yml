name: Update Claude Code Docs Refs

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update-refs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Update claude-code-docs submodule
        run: git submodule update --remote .upstreams/claude-code-docs

      - name: Check if upstream docs changed
        id: check
        run: |
          if git diff --quiet .upstreams/claude-code-docs; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (copies refs + generates SKILL.md)
        if: steps.check.outputs.changed == 'true'
        run: bun scripts/gen-skill-docs.ts

      - name: Check if refs actually changed
        if: steps.check.outputs.changed == 'true'
        id: refs-changed
        run: |
          if git diff --quiet skills/; then
            echo "refs_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "refs_changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            git diff --name-only skills/
          fi

      - name: Bump patch version
        if: steps.refs-changed.outputs.refs_changed == 'true'
        id: version
        run: |
          # Read current version from plugin.json
          VERSION=$(jq -r .version .claude-plugin/plugin.json)

          # Split into a.b.c and increment c
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          # Update plugin.json
          jq --arg v "$NEW_VERSION" '.version = $v' .claude-plugin/plugin.json > tmp.json
          mv tmp.json .claude-plugin/plugin.json

          # Update VERSION file if it exists
          if [ -f VERSION ]; then
            echo "$NEW_VERSION" > VERSION
          fi

          # Update package.json version
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > tmp.json
          mv tmp.json package.json

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "old_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version bumped: $VERSION → $NEW_VERSION"

      - name: Update CHANGELOG
        if: steps.refs-changed.outputs.refs_changed == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date -u +%Y-%m-%d)
          CHANGED=$(git diff --name-only skills/*/refs/ | sed 's|.*/refs/||' | sort -u | tr '\n' ', ' | sed 's/,$//')

          # Prepend entry after the first line (# Changelog)
          sed -i "1a\\
          \\
          ## [${VERSION}] - ${DATE}\\
          \\
          Updated Claude Code reference docs: ${CHANGED}" CHANGELOG.md

      - name: Commit and push
        if: steps.refs-changed.outputs.refs_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${{ steps.version.outputs.version }}"

          # Stage everything
          git add .upstreams/claude-code-docs
          git add skills/*/refs/
          git add skills/*/SKILL.md
          git add .claude-plugin/plugin.json package.json
          git add VERSION CHANGELOG.md 2>/dev/null || true

          CHANGED=$(git diff --cached --name-only skills/*/refs/ | sed 's|.*/refs/||' | sort -u | tr '\n' ', ' | sed 's/,$//')

          git commit -m "chore: update claude-code refs → v${VERSION}

          Updated refs: ${CHANGED}"
          git push

      - name: Create release tag
        if: steps.refs-changed.outputs.refs_changed == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Read changelog entry
        if: steps.refs-changed.outputs.refs_changed == 'true'
        id: changelog
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ steps.version.outputs.version }}
          path: ./CHANGELOG.md
          validation_level: warn

      - name: Create GitHub release
        if: steps.refs-changed.outputs.refs_changed == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changes }}
          makeLatest: false

      - name: No changes
        if: steps.check.outputs.changed != 'true'
        run: echo "No upstream changes detected"
