name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.0'  # Only manual releases (a.b.0), not CI patch bumps

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version and changelog
        id: info
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Extract changelog entry (between ## headers)
          NOTES=$(awk "/^## ${VERSION}/,/^## [0-9]/" CHANGELOG.md | sed '$ d')
          # Write multiline to output
          {
            echo "notes<<NOTES_EOF"
            echo "$NOTES"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "v${{ steps.info.outputs.version }}" \
            --notes "${{ steps.info.outputs.notes }}" \
            --latest
